<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="platform-detect.js"></script>
  <title>NextDNS Medic</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <img src="icons/icon48.png" class="logo" alt="NextDNS Medic" />
        <div>
          <div class="title">NextDNS Medic</div>
          <div class="subtitle" id="page-host">Loading...</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="btn-settings" class="icon-btn" title="Settings">⚙️</button>
        <button id="btn-clear" class="icon-btn" title="Clear">🗑️</button>
      </div>
    </div>

    <!-- Settings Panel (hidden by default) -->
    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-title">Settings</div>

      <label class="settings-label">DNS Provider</label>
      <select id="provider-select" class="settings-input settings-select">
        <option value="nextdns">NextDNS</option>
        <option value="pihole">Pi-hole</option>
      </select>

      <!-- NextDNS fields -->
      <div id="provider-nextdns" class="provider-fields">
        <label class="settings-label">API Key</label>
        <div class="api-key-row">
          <input type="password" id="api-key-input" placeholder="Paste your NextDNS API key" class="settings-input api-key-input" />
          <button id="btn-lookup-profiles" class="lookup-btn" title="Look up profiles">→</button>
          <button id="btn-clear-apikey" class="clear-apikey-btn hidden" title="Clear API key">Clear</button>
        </div>

        <!-- Profile picker — shown after lookup -->
        <div id="ndm-profile-section" class="hidden">
          <label class="settings-label">Profile</label>
          <div id="ndm-profile-list" class="ndm-profile-list"></div>
        </div>
      </div>

      <!-- Pi-hole fields -->
      <div id="provider-pihole" class="provider-fields hidden">
        <label class="settings-label">Pi-hole URL</label>
        <input type="text" id="pihole-url-input" placeholder="http://pi.hole or http://192.168.1.100" class="settings-input" />
        <label class="settings-label">Password / API Token</label>
        <input type="password" id="pihole-token-input" placeholder="Web UI password (v6) or API token (v5)" class="settings-input" />
        <div class="pihole-token-hint">Pi-hole v6: your web UI password · Pi-hole v5: Admin → Settings → API</div>
        <div class="pihole-version-row">
          <span id="pihole-version-label" class="pihole-version-label"></span>
          <button id="btn-test-pihole" class="test-btn">Test Connection</button>
        </div>
      </div>

      <button id="btn-save-settings" class="save-btn">Save Settings</button>
      <div id="settings-status" class="settings-status"></div>
      <div class="db-section">
        <div class="db-section-header">Domain Database</div>
        <div class="db-meta-row">
          <span id="db-meta-label" class="db-meta-label">Loading...</span>
          <button id="btn-refresh-db" class="refresh-db-btn">↻ Refresh</button>
        </div>
      </div>
    </div>

    <!-- DNS Flush Banner (shown after allowlist action) -->
    <div id="flush-banner" class="flush-banner hidden">
      <div class="flush-banner-top">
        <span class="flush-banner-title">✓ Added — flush DNS to apply</span>
        <button id="flush-dismiss" class="flush-dismiss" title="Dismiss">✕</button>
      </div>
      <div class="flush-banner-cmd">
        <code id="flush-cmd" class="flush-cmd-text"></code>
        <button id="flush-copy" class="flush-copy-btn">📋</button>
      </div>
    </div>

    <!-- Stats bar -->
    <div id="stats-bar" class="stats-bar hidden">
      <div class="stat">
        <span class="stat-num" id="stat-high">0</span>
        <span class="stat-label high-label">High</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num" id="stat-medium">0</span>
        <span class="stat-label medium-label">Medium</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num" id="stat-low">0</span>
        <span class="stat-label low-label">Low</span>
      </div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">✅</div>
      <div class="empty-title">No blocked requests detected</div>
      <div class="empty-subtitle">Monitoring this page's network traffic</div>
    </div>

    <!-- Blocks list -->
    <div id="blocks-list" class="blocks-list hidden"></div>

  </div>

  <script src="browser-compat.js"></script>
  <script src="domain-db.js"></script>
  <script src="popup.js"></script>
</body>
</html>
