<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DNS Medic — Screenshots</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1280px; height:800px;
  background: linear-gradient(135deg, #0d1117 0%, #0f1520 50%, #0d1117 100%);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display:flex; align-items:center; justify-content:space-between;
  padding: 0 80px;
  overflow:hidden;
}
.left { flex:0 0 460px; display:flex; flex-direction:column; }
.brand { display:flex; align-items:center; gap:10px; margin-bottom:32px; }
.brand img { width:34px; height:34px; border-radius:8px; }
.brand-name { font-size:14px; font-weight:600; color:#64748b; letter-spacing:.02em; }
.headline { font-size:38px; font-weight:800; line-height:1.15; color:#f1f5f9; margin-bottom:14px; }
.headline em { font-style:normal; color:#22d3ee; }
.subline { font-size:16px; color:#475569; line-height:1.6; margin-bottom:28px; }
.pills { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:28px; }
.pill { font-size:12px; font-weight:600; padding:5px 12px; border-radius:20px; }
.pill-red    { background:#2d0a0a; border:1px solid #dc262666; color:#f87171; }
.pill-blue   { background:#0a1a2d; border:1px solid #3b82f666; color:#93c5fd; }
.pill-green  { background:#0d1a0d; border:1px solid #22c55e66; color:#86efac; }
.pill-purple { background:#1a0a2d; border:1px solid #a855f766; color:#d8b4fe; }
.pill-amber  { background:#2d1a00; border:1px solid #f59e0b66; color:#fcd34d; }
.pill-slate  { background:#1a1f2e; border:1px solid #47556966; color:#94a3b8; }
.feature-list { display:flex; flex-direction:column; gap:12px; }
.feature-item { display:flex; align-items:flex-start; gap:12px; font-size:14px; color:#64748b; line-height:1.4; }
.fi-icon { font-size:18px; flex-shrink:0; margin-top:1px; }
.right { flex:0 0 480px; filter:drop-shadow(0 24px 60px rgba(0,0,0,0.9)); }
.popup { background:#0f1117; border-radius:14px; border:1px solid #2a2d3e; overflow:hidden; color:#e2e8f0; font-size:13px; }
.p-header { background:#1a1d27; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #2a2d3e; }
.p-header-left { display:flex; align-items:center; gap:10px; }
.p-header img { width:22px; height:22px; border-radius:5px; }
.p-title { font-size:13px; font-weight:700; color:#f1f5f9; }
.p-sub { font-size:11px; color:#475569; margin-top:1px; }
.p-icons { font-size:14px; color:#475569; display:flex; gap:8px; }
.stats { display:flex; border-bottom:1px solid #1e2130; }
.stat { flex:1; padding:10px 0; text-align:center; }
.stat:not(:last-child) { border-right:1px solid #1e2130; }
.stat-n { font-size:22px; font-weight:700; display:block; line-height:1; }
.stat-l { font-size:10px; color:#475569; text-transform:uppercase; letter-spacing:.05em; }
.shdr { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:8px 14px 5px; display:flex; align-items:center; gap:6px; }
.shdr::after { content:""; flex:1; height:1px; background:currentColor; opacity:.15; }
.shdr.high { color:#f87171; } .shdr.medium { color:#fbbf24; } .shdr.low { color:#4ade80; }
.brow { display:flex; align-items:flex-start; gap:10px; padding:9px 14px; border-bottom:1px solid #13161f; }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.dot.HIGH { background:#ef4444; box-shadow:0 0 5px #ef444488; }
.dot.MEDIUM { background:#f59e0b; box-shadow:0 0 5px #f59e0b88; }
.dot.LOW { background:#4ade80; }
.binfo { flex:1; min-width:0; }
.bdomain { font-size:12px; font-weight:600; color:#f1f5f9; }
.blabel { font-size:11px; color:#475569; margin-top:1px; }
.bmeta { font-size:10px; color:#334155; margin-top:2px; font-family:monospace; }
.ibadge { display:inline-block; font-size:10px; font-weight:600; padding:2px 7px; border-radius:4px; margin-top:4px; }
.ibadge-purple { background:#1a0a2d; border:1px solid #a855f755; color:#d8b4fe; }
.ibadge-red { background:#2d0a0a; border:1px solid #dc262655; color:#f87171; }
.bltags { display:flex; gap:4px; flex-wrap:wrap; margin-top:3px; }
.bltag { font-size:10px; color:#64748b; background:#1e2130; border:1px solid #2a2d3e; border-radius:4px; padding:1px 6px; }
.abtn { font-size:11px; font-weight:600; padding:5px 10px; background:#1e3a5f; border:1px solid #3b82f666; border-radius:6px; color:#60a5fa; white-space:nowrap; flex-shrink:0; margin-top:2px; }
.abtn.ok { background:#14532d; border-color:#22c55e66; color:#4ade80; }
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 20px; gap:8px; }
.settings-wrap { padding:16px; }
.s-title { font-size:11px; font-weight:700; color:#475569; letter-spacing:.08em; text-transform:uppercase; margin-bottom:12px; }
.s-label { display:block; font-size:11px; color:#64748b; margin-bottom:4px; margin-top:10px; }
.s-input { width:100%; background:#0f1117; border:1px solid #2a2d3e; border-radius:6px; color:#e2e8f0; padding:7px 10px; font-size:12px; }
.s-row { display:flex; gap:8px; align-items:center; margin-top:10px; }
.s-arrow { background:#1e2d40; border:1px solid #3b82f666; border-radius:6px; color:#60a5fa; font-size:13px; padding:6px 10px; flex-shrink:0; }
.save-btn { margin-top:12px; width:100%; background:#6366f1; border:none; border-radius:6px; color:white; font-size:13px; font-weight:600; padding:9px; }
.save-ok { margin-top:8px; font-size:11px; color:#4ade80; text-align:center; }
.profile-card { background:#1a1d27; border:1px solid #22c55e55; border-radius:8px; padding:10px 12px; margin-top:10px; display:flex; align-items:center; gap:10px; }
.profile-badge { font-size:10px; color:#4ade80; background:#0d1a0d; border:1px solid #22c55e55; border-radius:4px; padding:1px 6px; }
.flush-banner { background:#0d1f0d; border:1px solid #22c55e55; padding:10px 14px; display:flex; align-items:center; gap:8px; font-size:11px; color:#86efac; }
.flush-cmd { font-family:monospace; color:#4ade80; font-size:10px; }
.flush-copy { background:#14532d; border:1px solid #22c55e55; border-radius:4px; color:#4ade80; font-size:10px; padding:2px 7px; flex-shrink:0; }
</style>
</head>

  return '<div class="p-header"><div class="p-header-left"><img src="'+ICON+'"/><div><div class="p-title">DNS Medic</div><div class="p-sub">'+src+'</div></div></div><div class="p-icons"><span>&#9881;&#65039;</span><span>&#128465;&#65039;</span></div></div>';
}
function statsBar(h,m,l) {
  var hc = h>0?"#f87171":"#475569", mc = m>0?"#fbbf24":"#475569", lc = l>0?"#4ade80":"#475569";
  return '<div class="stats"><div class="stat"><span class="stat-n" style="color:'+hc+'">'+h+'</span><span class="stat-l">High</span></div><div class="stat"><span class="stat-n" style="color:'+mc+'">'+m+'</span><span class="stat-l">Medium</span></div><div class="stat"><span class="stat-n" style="color:'+lc+'">'+l+'</span><span class="stat-l">Low</span></div></div>';
}
function sectionHdr(cls,label) {
  return '<div class="shdr '+cls+'">'+label+'</div>';
}
function blockRow(confidence, domain, label, meta, badge, tags, btnOk) {
  var btn = btnOk ? '<button class="abtn ok">&#10003; Added</button>' : '<button class="abtn">+ Allowlist</button>';
  var badgeHtml = badge ? '<span class="ibadge ibadge-'+badge.cls+'">'+badge.text+'</span>' : '';
  var tagHtml = tags ? '<div class="bltags">'+tags.map(function(t){return '<span class="bltag">'+t+'</span>';}).join('')+'</div>' : '';
  return '<div class="brow"><div class="dot '+confidence+'"></div><div class="binfo"><div class="bdomain">'+domain+'</div><div class="blabel">'+label+'</div><div class="bmeta">'+meta+'</div>'+badgeHtml+tagHtml+'</div>'+btn+'</div>';
}

  3: hdr("Settings") +
     '<div class="settings-wrap">' +

     '<button class="save-btn">Save Settings</button>' +
     '<div class="save-ok">&#10003; Settings saved</div></div>',

  4: hdr("example.com") +
     '<div class="empty"><div style="font-size:36px">&#9989;</div><div style="font-weight:600;font-size:14px;color:#e2e8f0;margin-top:8px">No blocked requests detected</div><div style="font-size:12px;color:#475569;margin-top:6px">Monitoring network traffic on this page</div></div>',

  5: hdr("shop.example.com") + statsBar(2,0,0) +
     sectionHdr("high","&#128308; High &mdash; May break this site") +
     blockRow("HIGH","featureassets.org","Feature Flags (Statsig)","cert issuer not recognized &times;4",
       {cls:"purple",text:"&#128681; Feature flags affected"},["HaGeZi &mdash; Multi PRO++"],true) +

     blockRow("HIGH","app.launchdarkly.com","Feature Flags (LaunchDarkly)","cert issuer not recognized &times;2",
       {cls:"purple",text:"&#128681; Feature flags affected"},["HaGeZi &mdash; Multi PRO++"],false)

};

var s = lefts[state];
var lh = '<div class="brand"><img src="'+ICON+'"/><span class="brand-name">DNS Medic</span></div>' +
         '<div class="headline">'+s.headline+'</div>' +
         '<div class="subline">'+s.sub+'</div>';

if (s.pills) {
  lh += '<div class="pills">'+s.pills.map(function(p){return '<span class="pill '+p.cls+'">'+p.t+'</span>';}).join('')+'</div>';

document.getElementById("left").innerHTML = lh;

</script>
